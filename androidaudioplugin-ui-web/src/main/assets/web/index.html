<html>
<head>
    <style type='text/css'>
body { font-family: sans-serif; }
table { border-collapse: collapse; }
th, td { padding: 4px 8px; vertical-align: top; }
webaudio-knob { padding: 5px; }
.parameter-control { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 96px; }
.parameter-value { min-height: 1em; font-size: 12px; color: #666; text-align: center; }
</style>
    <script type='text/javascript'><!--
    /* debugging aid
    var AAPInterop = {};
    AAPInterop.getParameterCount = function() { return 2; };
    AAPInterop.getParameter = function(id) {
      var para = {};
      para.getName = function() { return "Whee"; }
      para.getMinValue = function() { return 0.0; }
      para.getMaxValue = function() { return 1.0; }
      para.getDefaultValue = function() { return 0.5; }
      return para;
    };
    AAPInterop.onInitialize = function() {};
    AAPInterop.onShow = function() {};
    */
  var midiChannel = 0;
  var octave = 4;
  var noteVelocity = 100;
  var parameterControls = {};
  var parameterValueLabels = {};

  function formatParameterValue(value) {
    var rounded = Number(value);
    if (!Number.isFinite(rounded))
      return "";
    if (Math.abs(rounded) >= 100 || Number.isInteger(rounded))
      return rounded.toString();
    return rounded.toFixed(3).replace(/\.?0+$/, '');
  }

  function updateParameterControl(parameterId, value) {
    var knob = parameterControls[parameterId];
    if (!knob)
      return;
    knob.setAttribute('value', value);
    knob.value = value;
    var label = parameterValueLabels[parameterId];
    if (label)
      label.textContent = formatParameterValue(value);
  }

  function initialize() {
    AAPInterop.onInitialize();

    for (el of document.getElementsByTagName('webaudio-knob')) {
      el.addEventListener('change', function(e) {
        sendInput(e.target.getAttribute('id_'), e.target.value);
      });
    }
    for (el of document.getElementsByTagName('webaudio-keyboard')) {
      el.addEventListener('change', function(e) {
        sendNote(e.note[0], e.note[1] + octave * 12);
      });
    }

    var paramTable = document.getElementById('parameters');
    var nParams = AAPInterop.getParameterCount();
    var nCols = 2;
    var tr = null;
    for (var i = 0; i < nParams; i++) {
      var para = AAPInterop.getParameter(i);
      if (i % nCols == 0) {
        tr = document.createElement('tr');
        paramTable.appendChild(tr);
      }
      var th = document.createElement('th');
      var name = document.createTextNode(para.getName());
      th.appendChild(name);
      tr.appendChild(th);
      var td = document.createElement('td');
      tr.appendChild(td);
      var control = document.createElement('div');
      control.className = 'parameter-control';
      var knob = document.createElement('webaudio-knob');
      knob.aapParameterId = para.getId();
      knob.setAttribute('min', para.getMinValue());
      knob.setAttribute('max', para.getMaxValue());
      knob.setAttribute('value', para.getDefaultValue());
      knob.setAttribute('src', 'bright_life.png');
      knob.addEventListener("change", (ev) => {
        AAPInterop.setParameter(ev.target.aapParameterId, Number(ev.target.value));
        updateParameterControl(ev.target.aapParameterId, Number(ev.target.value));
      });
      var valueLabel = document.createElement('div');
      valueLabel.className = 'parameter-value';
      parameterControls[knob.aapParameterId] = knob;
      parameterValueLabels[knob.aapParameterId] = valueLabel;
      control.appendChild(knob);
      control.appendChild(valueLabel);
      td.appendChild(control);
      updateParameterControl(knob.aapParameterId, para.getDefaultValue());
    }
  }

  function terminate() {
    AAPInterop.onCleanup();
  }

  function sendNote(state, note) {
    var arr = Uint8Array.from(state ? [0x90 + midiChannel, note, noteVelocity] : [0x80 + midiChannel, note, 0]);
    AAPInterop.sendMidi1(arr, 0, arr.length);
  }

  window.AAPInteropHost = {
    updateParameters: function(values) {
      Object.keys(values).forEach(function(parameterId) {
        updateParameterControl(parameterId, values[parameterId]);
      });
    }
  };
//--></script>
    <script type='text/javascript' src='webcoomponents-lite.js'></script>
    <script type='text/javascript' src='webaudio-controls.js'></script>
</head>
<body onLoad='initialize()' onUnload='terminate()'>
<webaudio-keyboard width="300" height="50" keys="24"></webaudio-keyboard>
<table id='parameters'>
</table>
</body>
</html>
